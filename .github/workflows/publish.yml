# Build per-arch images for Home Assistant Supervisor (replaces {arch} in add-on config).
name: Publish add-on images

on:
  push:
    branches: [main]
    paths:
      - "navhome/**"
      - ".github/workflows/publish.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: aarch64
            platform: linux/arm64
          - arch: amd64
            platform: linux/amd64
          - arch: armhf
            platform: linux/arm/v6
          - arch: armv7
            platform: linux/arm/v7
    steps:
      - uses: actions/checkout@v4

      - name: Require PAT for private NavHome checkout
        if: ${{ secrets.NAVHOME_REPO_PAT == '' }}
        run: |
          echo "::error::Set Actions secret NAVHOME_REPO_PAT — fine-grained PAT, Contents: Read on repo seayniclabs/navhome. GITHUB_TOKEN cannot read other private org repos (checkout returns Not Found)."
          exit 1

      - name: Checkout NavHome app
        if: ${{ secrets.NAVHOME_REPO_PAT != '' }}
        uses: actions/checkout@v4
        with:
          repository: seayniclabs/navhome
          path: navhome/app
          token: ${{ secrets.NAVHOME_REPO_PAT }}

      - name: Read add-on version
        id: meta
        run: |
          v=$(grep -E '^version:' navhome/config.yaml | awk '{print $2}' | tr -d '"')
          echo "version=$v" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: ./navhome
          file: ./navhome/Dockerfile
          push: true
          platforms: ${{ matrix.platform }}
          build-args: BUILD_FROM=ghcr.io/home-assistant/${{ matrix.arch }}-base:3.19
          tags: ghcr.io/seayniclabs/navhome-ha-${{ matrix.arch }}:${{ steps.meta.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
